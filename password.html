<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1120;
    color:white;
    text-align:center;
}
header{
    background:#2563eb;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}
.container{
    padding:40px 20px;
}
.tool{
    background:#1e293b;
    margin:15px auto;
    max-width:500px;
    padding:20px;
    border-radius:12px;
}
button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#1d4ed8;
}
</style>

</head>
<body>

<header>🔐 Password Generator</header>

<div class="container">

<div class="tool">
<h2>Strong Password Generator</h2>
<button>Coming Soon</button>
</div>

<div class="tool">
<h2>Password Strength Checker</h2>
<button>Coming Soon</button>
</div>

<div class="tool">
<h2>Random PIN Generator</h2>
<input type="text" id="password" readonly
style="width:90%;padding:12px;border-radius:8px;border:none;margin-bottom:15px;">

<br>

<button onclick="generatePassword()">Generate Password</button>

<script>
function generatePassword(){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
let pass="";
for(let i=0;i<12;i++){
pass+=chars.charAt(Math.floor(Math.random()*chars.length));
}
document.getElementById("password").value=pass;
}
</script>
</div>

</div>

</body>
</html>
