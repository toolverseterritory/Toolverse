<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolVerse</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
text-align:center;
}
header{
background:#2563eb;
padding:20px;
font-size:30px;
font-weight:bold;
}
.hero{
padding:60px 20px;
}
input{
width:80%;
max-width:400px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}
.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}
footer{
padding:20px;
background:#111827;
margin-top:30px;
}
</style>
</head>
<body>

<header>🚀 ToolVerse</header>

<div class="hero">
<h1>All Online Tools in One Place</h1>
<p>PDF • Image • AI • Calculator • Utility Tools</p>
<input type="text" placeholder="Search tools...">
</div>

<div class="tools">
<div class="card">📄 PDF Tools</div>
<div class="card">🖼 Image Tools</div>
<div class="card">🧮 Calculators</div>
<div class="card">🤖 AI Tools</div>
<div class="card">🔐 Password Generator</div>
<div class="card">📱 Utility Tools</div>
</div>

<footer>
© 2026 ToolVerse. All Rights Reserved.
</footer>

</body>
</html>
