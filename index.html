<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolVerse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#111827;
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#cbd5e1;
margin-bottom:30px;
}

.search{
width:90%;
max-width:600px;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

@media(max-width:768px){

header{
flex-direction:column;
}

nav{
margin-top:10px;
}

.hero h1{
font-size:34px;
}

}
  .tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px 20px;
max-width:1200px;
margin:auto;
}

.card{
display:block;
background:#1b2435;
color:#fff;
text-decoration:none;
padding:25px;
border-radius:15px;
text-align:center;
font-size:20px;
font-weight:bold;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-8px);
background:#2563eb;
}
</style>

</head>

<body>

<header>

<div class="logo">🚀 ToolVerse</div>

<nav>

<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">Pricing</a>
<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<h1>All Online Tools in One Place</h1>

<p>PDF • Image • AI • Utility • Calculator Tools</p>

<input class="search" placeholder="Search any tool...">

<br>

<a class="btn" href="#">Explore Tools</a>

</section>
<div class="tools">

<a href="pdf.html" class="card">📄 PDF Tools</a>

<a href="image.html" class="card">🖼️ Image Tools</a>

<a href="calculator.html" class="card">🧮 Calculators</a>

<a href="ai.html" class="card">🤖 AI Tools</a>

<a href="password.html" class="card">🔐 Password Generator</a>

<a href="utility.html" class="card">🛠 Utility Tools</a>

</div>
</body>
</html>
